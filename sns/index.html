<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>私たちのSNS - TOPLAND</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f8f9fa] text-gray-900 antialiased font-sans pb-24 md:pb-0">

    <header class="bg-white/90 border-b border-gray-100 sticky top-0 z-40 backdrop-blur-md shadow-xs h-16 flex items-center justify-between px-4">
        <a href="../" class="w-10 h-10 flex items-center justify-start text-gray-800 active:scale-90 transition-transform">
            <i class="fa-solid fa-chevron-left text-lg"></i>
        </a>
        <h1 class="text-sm font-black text-gray-900 tracking-tight">私たちのSNS</h1>
        <div class="w-10"></div> </header>

    <main class="max-w-md mx-auto p-4 space-y-4 py-8">
        
        <div class="text-center space-y-1.5 mb-8">
            <h2 class="text-lg font-black text-gray-900 tracking-tight">Official Community</h2>
            <p class="text-xs text-gray-500 font-bold">最新情報や限定クーポン、注文手続きは公式SNSから！</p>
        </div>

        <a href="https://discord.gg/ZdDvVmg6d8" target="_blank" 
           class="flex items-center justify-between p-5 bg-[#5865F2] text-white rounded-3xl shadow-xl shadow-[#5865F2]/20 active:scale-95 transition-all group">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center text-3xl">
                    <i class="fa-brands fa-discord"></i>
                </div>
                <div>
                    <h3 class="text-base font-black tracking-tight mb-1">公式 Discord</h3>
                    <p class="text-[10px] text-white/80 font-bold">注文・決済・お問い合わせはこちら</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-sm text-white/50 group-hover:text-white transition-colors mr-1"></i>
        </a>

        <a href="https://www.tiktok.com/" target="_blank" 
           class="flex items-center justify-between p-5 bg-gray-900 text-white rounded-3xl shadow-xl shadow-black/20 active:scale-95 transition-all group">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center text-3xl">
                    <i class="fa-brands fa-tiktok"></i>
                </div>
                <div>
                    <h3 class="text-base font-black tracking-tight mb-1">公式 TikTok</h3>
                    <p class="text-[10px] text-white/80 font-bold">近日公開予定...</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-sm text-white/50 group-hover:text-white transition-colors mr-1"></i>
        </a>

    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-200 z-40 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
        <div class="flex justify-around items-center h-20 px-2">
            <a href="../" class="flex flex-col items-center justify-center w-20 h-full text-gray-400 hover:text-gray-900 transition-colors">
                <i class="fa-solid fa-house text-2xl mb-1.5"></i>
                <span class="text-[10px] font-bold">ホーム</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center w-20 h-full text-gray-900">
                <i class="fa-solid fa-share-nodes text-2xl mb-1.5"></i>
                <span class="text-[10px] font-black">SNS</span>
            </a>
            <a href="../cart/" class="flex flex-col items-center justify-center w-20 h-full text-gray-400 hover:text-gray-900 transition-colors relative">
                <i class="fa-solid fa-bag-shopping text-2xl mb-1.5"></i>
                <span class="text-[10px] font-bold">カート</span>
            </a>
        </div>
    </nav>

</body>
</html>
